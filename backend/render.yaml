databases:
  - name: keeperme-db
    databaseName: keeperme_db
    plan: free
    region: oregon

services:
  # Web Service (API)
  - type: web
    name: keeperme-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: yarn install && yarn build && npx prisma migrate deploy
    startCommand: yarn run start:prod
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: keeperme-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_BUNDLE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false

